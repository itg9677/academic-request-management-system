<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الموظفين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>*{font-family:'Tajawal',sans-serif !important;}</style>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<div class="container">

    <img src="images/Qassim_University_logo.svg.png" class="logo" alt="شعار الجامعة">
    <img src="images/pattern.png" class="science-pattern" alt="">

    <h1 class="title">نظام الخدمات الطلابية</h1>
    <p style="text-align:center;">تسجيل حساب موظف جديد</p>

    <form id="employeeRegisterForm" class="form">

        <div class="input-group">
            <label>اسم الموظف</label>
            <input type="text" id="employeeName" required>
        </div>

        <div class="input-group">
            <label>الرقم الوظيفي</label>
            <input type="text" id="employeeId" required>
        </div>

        <div class="input-group">
            <label>القسم</label>
            <select id="department" required>
                <option value="">اختر القسم</option>
                <option value="فيزياء">فيزياء</option>
                <option value="أحياء">أحياء</option>
                <option value="رياضيات">رياضيات</option>
                <option value="كيمياء">كيمياء</option>
                <option value="إحصاء">إحصاء</option>
                <option value="شؤون الطالبات">شؤون الطالبات</option>
            </select>
        </div>

        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="btn">تسجيل</button>
        <div class="links">
            <a href="EmployeeLogin.html">لدي حساب بالفعل </a>
            </a>
        </div>


    </form>

    <p id="msg"></p>

</div>

<script type="module" src="./employeeRegister.js"></script>

</body>
</html>
