<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>*{font-family:'Tajawal',sans-serif !important;}</style>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="container">

        <img src="images/Qassim_University_logo.svg.png"
             class="logo"
             alt="شعار الجامعة">
        <img src="images/pattern.png" class="science-pattern" alt="">

        <h3 class="title">نظام الخدمات الطلابية</h3>

        <form id="employeeLoginForm">

            <div class="input-group">
                <label for="employeeId">الرقم الوظيفي</label>
                <input type="text" id="employeeId" name="employeeId" required>
            </div>

            <div class="input-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn">
                تسجيل الدخول
            </button>

        </form>

        <p id="msg" style="text-align:center; margin-top:12px; font-size:13px;"></p>

        <div class="links">
            <a href="forgotPassword.html?type=employee">نسيت كلمة المرور</a>
            <a href="EmployRegister.html">مستخدم جديد؟ سجل</a>
        </div>

    </div>

    <script type="module" src="./employeeLogin.js"></script>

</body>
</html>
