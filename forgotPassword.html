<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- شعار الجامعة -->
        <img
            src="images/Qassim_University_logo.svg.png"
            alt="شعار الجامعة"
            class="logo">

        <!-- العنوان -->
        <h2 class="title">نسيت كلمة المرور</h2>

        <!-- وصف -->
        <p class="description">
            أدخل البريد الإلكتروني المرتبط بحسابك وسيتم إرسال رابط لإعادة تعيين كلمة المرور.
        </p>

        <!-- النموذج -->
        <div class="form">

            <div class="input-group">
                <label for="email">البريد الإلكتروني</label>

                <input
                    type="email"
                    id="email"
                    placeholder="أدخل البريد الإلكتروني"
                    required>
            </div>

            <button
                type="button"
                id="resetBtn"
                class="btn">
                إرسال رابط إعادة التعيين
            </button>

            <!-- رسائل النجاح والخطأ -->
            <p id="msg" class="message"></p>

           
<a id="backLink" class="back-link" href="#">
    العودة إلى تسجيل الدخول
</a>
        </div>

    </div>

    <script type="module" src="forgotPassword.js"></script>

</body>
</html>
