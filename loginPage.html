<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="container">

        <img src="images/Qassim_University_logo.svg.png"
             class="logo"
             alt="شعار الجامعة">
        <img src="images/pattern.png" class="science-pattern" alt="">

        <h3 class="title">نظام الخدمات الطلابية</h3>

        <!-- 🔥 مهم جدًا: هذا الـ id لازم يطابق الجافا -->
        <form id="loginForm">

            <div class="input-group">
                <label for="universityId">الرقم الجامعي</label>
                <input type="text" id="universityId" name="universityId" required>
            </div>

            <div class="input-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn">
                تسجيل الدخول
            </button>

        </form>

        <div class="links">
            <a href="forgotPassword.html?type=student">نسيت كلمة المرور</a>

            <a href="StudentRegister.html">
                مستخدم جديد؟ سجل
            </a>
        </div>

    </div>

    <!-- 🔥 ربط ملف الجافاسكربت الصحيح -->
    <script type="module" src="loginpage.js"></script>

</body>
</html>
