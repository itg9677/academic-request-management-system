<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طلب زيارة</title>
<link rel="stylesheet" href="visitRequest.css">
<style>
</style>
</head>

<body>

<div class="page">

    <div class="logo-container">
        <img src="images/Qassim_University_logo.svg.png" alt="logo">
    </div>

    <img src="images/pattern.png" class="science-pattern" alt="">

    <div class="request-form">

        <h1>طلب زيارة</h1>

        <!-- بيانات الطالبة -->
        <div class="section-divider">بيانات الطالبة</div>
        <div class="form-grid student-info">
            <div class="form-group">
                <label>الاسم</label>
                <input type="text" id="fullName" readonly class="readonly-field">
            </div>
            <div class="form-group">
                <label>الرقم الجامعي</label>
                <input type="text" id="universityId" readonly class="readonly-field">
            </div>
            <div class="form-group">
                <label>التخصص</label>
                <input type="text" id="major" readonly class="readonly-field">
            </div>
        </div>

        <!-- رقم الجوال -->
        <div class="form-grid">
            <div class="form-group">
                <label>رقم الجوال</label>
                <input type="text" id="phone" readonly class="readonly-field">
            </div>
        </div>

        <!-- تفاصيل الزيارة -->
        <div class="section-divider">تفاصيل الزيارة</div>
        <div class="form-group">
            <label>نوع الزيارة</label>
            <div class="radio-group">
                <label class="radio-card">
                    <input type="radio" name="visitType" value="internal"> زيارة داخلية
                </label>
                <label class="radio-card">
                    <input type="radio" name="visitType" value="external"> زيارة خارجية
                </label>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>المستوى الدراسي</label>
                <select id="level">
                    <option value="" disabled selected>اختر المستوى</option>
                    <option value="1">المستوى الأول</option>
                    <option value="2">المستوى الثاني</option>
                    <option value="3">المستوى الثالث</option>
                    <option value="4">المستوى الرابع</option>
                    <option value="5">المستوى الخامس</option>
                    <option value="6">المستوى السادس</option>
                    <option value="7">المستوى السابع</option>
                    <option value="8">المستوى الثامن</option>
                </select>
            </div>
            <div class="form-group" id="visitPlaceGroup" style="display:none">
                <label>المقر المراد زيارته</label>
                <select id="visitPlace">
                    <option value="" disabled selected>اختاري المقر</option>
                    <option value="البدائع">البدائع</option>
                    <option value="عنيزة">عنيزة</option>
                    <option value="الرس">الرس</option>
                    <option value="الأسياح">الأسياح</option>
                    <option value="البكيرية">البكيرية</option>
                    <option value="رياض الخبراء">رياض الخبراء</option>
                    <option value="المذنب">المذنب</option>
                    <option value="عقلة الصقور">عقلة الصقور</option>
                    <option value="النبهانية">النبهانية</option>
                </select>
            </div>
        </div>

        <!-- نموذج الزيارة: يظهر فقط بعد اختيار "زيارة داخلية" وتحديد المقر -->
        <div id="visitFormSection" class="hidden full-width">
            <div class="section-divider">نموذج الزيارة</div>
            <div class="visit-form-download-area" id="visitFormDownload">
                <span class="no-form-msg">جاري التحميل...</span>
            </div>
        </div>

        <div class="form-group full-width">
            <label>سبب الزيارة</label>
            <textarea id="reason" rows="4" placeholder="اكتبي سبب الزيارة..."></textarea>
        </div>

        <!-- جدول المواد — بدون عمود الساعات -->
        <div class="section-divider">المواد الدراسية</div>
        <div class="courses-table-wrapper">
            <table class="courses-table">
                <thead>
                    <tr>
                        <th>م</th>
                        <th>اسم المادة</th>
                        <th>الرمز</th>
                        <th>الشعبة</th>
                    </tr>
                </thead>
                <tbody id="coursesBody"></tbody>
            </table>
        </div>

        <button type="button" class="btn-add-course" onclick="addCourseRow()">
            <span class="plus">+</span> إضافة مادة
        </button>

        <br><br>
        <button id="submitBtn">إرسال الطلب</button>
        <button type="button" class="btn-track" onclick="window.location.href='VisitsHistory.html'">متابعة طلب سابق</button>

    </div>

</div>

<script type="module" src="visitRequest.js"></script>
</body>
</html>
