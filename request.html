<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الحذف والإضافة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --blue:#1a3a6b;
    --blue-pale:#eef3fb;
    --gray-light:#d8e0ec;
    --gold:#c8972b;
    --text:#1a3a6b;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Tajawal',sans-serif;
    background:#f4f6fa;
    color:var(--text);
}

.university-banner{
    text-align:center;
    padding:20px;
}

.university-banner img{height:100px}

.card{
    background:#fff;
    border-radius:16px;
    border-top:4px solid var(--gold);
    padding:20px;
    margin:20px auto;
    max-width:850px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.card-title{
    font-weight:700;
    margin-bottom:12px;
}

.section-block{
    padding:15px;
    border:1px solid var(--gray-light);
    border-radius:12px;
    margin-bottom:10px;
}

.combo-wrapper{
    display:flex;
    flex-direction:column;
}

.combo-select{
    padding:10px;
    border:1px solid #d8e0ec;
    border-radius:10px;
    font-family:'Tajawal',sans-serif;
}

.btn-add-row{
    background:var(--blue-pale);
    border:1px dashed var(--blue);
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

.btn-remove{
    margin-top:10px;
    background:#ff4d4f;
    color:#fff;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

.actions{
    text-align:center;
    margin-top:20px;
}

.btn-submit{
    background:var(--blue);
    color:#fff;
    border:none;
    padding:12px 40px;
    border-radius:10px;
    cursor:pointer;
}

.btn-track{
    margin-top:10px;
    background:#c8972b;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="university-banner">
    <img src="images/Qassim_University_logo.svg.png">
    <div>نظام الحذف والإضافة</div>
</div>

<!-- إضافة -->
<div class="card">
    <div class="card-title">إضافة مقرر</div>
    <div id="addList"></div>
    <button class="btn-add-row" onclick="addRow('add')">+ إضافة</button>
</div>

<!-- حذف -->
<div class="card">
    <div class="card-title">حذف مقرر</div>
    <div id="removeList"></div>
    <button class="btn-add-row" onclick="addRow('remove')">+ حذف</button>
</div>

<!-- تغيير -->
<div class="card">
    <div class="card-title">تغيير شعبة</div>
    <div id="changeList"></div>
    <button class="btn-add-row" onclick="addRow('change')">+ تغيير</button>
</div>

<!-- ملاحظات -->
<div class="card">
    <div class="card-title">ملاحظات</div>
    <textarea id="notes" style="width:100%;padding:10px"></textarea>
</div>

<div class="actions">
    <button class="btn-submit" id="submitBtn">إرسال الطلب</button>

    <button class="btn-track" onclick="goToRequests()">
        متابعة الطلبات السابقة
    </button>
</div>

<script type="module" src="./request.js"></script>

</body>
</html>
