<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الحذف والإضافة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --blue:#1a3a6b;
    --blue-pale:#eef3fb;
    --gray-light:#d8e0ec;
    --gold:#c8972b;
    --text:#1a3a6b;

    /* أسماء موحدة لبقية الصفحات */
    --primary:var(--blue);
    --secondary:var(--gold);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Tajawal',sans-serif;}

body{
    font-family:'Tajawal',sans-serif;
    background:#f4f6fa;
    color:var(--text);
}

.university-banner{
    text-align:center;
    padding:20px;
}

.university-banner img{height:100px}

.request-form{
    width:95%;
    max-width:900px;
    margin:20px auto 40px;

    background:#fff;
    padding:30px;

    border-radius:18px;
    border-top:6px solid var(--secondary);

    box-shadow:0 10px 30px rgba(26,58,107,.08);
}

.card{
    background:#fff;
    border-radius:16px;
    border-top:4px solid var(--gold);
    padding:20px;
    margin:20px auto;
    max-width:850px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.card-title{
    font-weight:700;
    margin-bottom:12px;
}

.section-block{
    padding:15px;
    border:1px solid var(--gray-light);
    border-radius:12px;
    margin-bottom:10px;
}

.combo-wrapper{
    display:flex;
    flex-direction:column;
}

.combo-select{
    padding:10px;
    border:1px solid #d8e0ec;
    border-radius:10px;
    font-family:'Tajawal',sans-serif;
}

.btn-add-row{
    background:var(--blue-pale);
    border:1px dashed var(--blue);
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

.btn-remove{
    margin-top:10px;
    background:#ff4d4f;
    color:#fff;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}
       /* =====================================================
   أزرار أسفل النموذج - نفس تصميم صفحة الزيارة
===================================================== */

.actions{
    margin-top:35px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.btn-submit{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:var(--primary);
    color:#fff;
    font-size:17px;
    font-weight:700;
    font-family:'Tajawal',sans-serif;
    cursor:pointer;
    transition:.25s;
}

.btn-submit:hover{
    background:#15325c;
    transform:translateY(-2px);
    box-shadow:0 10px 22px rgba(26,58,107,.20);
}

.actions-bottom{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.btn-home,
.btn-track{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    font-family:'Tajawal',sans-serif;
    cursor:pointer;
    transition:.25s;
}

.btn-home{
    background:#6b7280;
    color:#fff;
}

.btn-home:hover{
    background:#59616d;
}

.btn-track{
    background:var(--secondary);
    color:#fff;
}

.btn-track:hover{
    background:#b88620;
}

@media (max-width:768px){
    .actions-bottom{
        grid-template-columns:1fr;
    }
}

.logo-container{
    text-align:center;
    margin-bottom:10px;
}

.logo-container img{
    width:280px;
    max-width:90%;
    height:auto;
}

/* =====================================================
   زخرفة كلية العلوم
===================================================== */
.science-pattern{
    display:block;
    width:90%;
    max-width:850px;
    margin: 10px auto 20px;
}

@media (max-width:768px){
    .request-form{
        width:95%;
        padding:18px 16px;
        border-radius:14px;
    }
}
</style>
</head>

<body>
    <div class="logo-container">
        <img src="images/Qassim_University_logo.svg.png" alt="logo">
    </div>

    <img src="images/pattern.png" class="science-pattern" alt="">

    <div class="request-form">
<!-- إضافة -->
<div class="card">
    <div class="card-title">إضافة مقرر</div>
    <div id="addList"></div>
    <button class="btn-add-row" onclick="addRow('add')">+ إضافة</button>
</div>

<!-- حذف -->
<div class="card">
    <div class="card-title">حذف مقرر</div>
    <div id="removeList"></div>
    <button class="btn-add-row" onclick="addRow('remove')">+ حذف</button>
</div>

<!-- تغيير -->
<div class="card">
    <div class="card-title">تغيير شعبة</div>
    <div id="changeList"></div>
    <button class="btn-add-row" onclick="addRow('change')">+ تغيير</button>
</div>

<!-- ملاحظات -->
<div class="card">
    <div class="card-title">ملاحظات</div>
    <textarea id="notes" style="width:100%;padding:10px"></textarea>
</div>

<div class="actions">

    <button id="submitBtn" class="btn-submit">
        إرسال الطلب
    </button>


    <div class="actions-bottom">

        <button
            type="button"
            class="btn-home"
            onclick="window.location.href='studentMainPage.html'">

            العودة للصفحة الرئيسية

        </button>


        <button
            type="button"
            class="btn-track"
            onclick="window.location.href='PreviousRequests.html'">

            متابعة الطلبات السابقة

        </button>

    </div>

</div>


<script type="module" src="./request.js"></script>

</body>
</html>
