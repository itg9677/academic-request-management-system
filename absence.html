<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع عذر الغياب</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="absence-page">

<div class="container">

    <h2>رفع عذر الغياب</h2>

    <form>

        <!-- اسم المادة -->
        <div class="form-group">
            <label>اسم المادة</label>
            <input type="text" placeholder="أدخل اسم المادة" required>
        </div>

        <!-- تاريخ الغياب -->
        <div class="form-group">
            <label>تاريخ الغياب</label>
            <input type="date" required>
        </div>

        <!-- سبب الغياب -->
        <div class="form-group">
            <label>سبب الغياب</label>
            <textarea placeholder="اكتب سبب الغياب" rows="4" required></textarea>
        </div>

        <!-- رفع ملف -->
        <div class="form-group">
            <label>إرفاق ملف</label>
            <input type="file" accept=".pdf,.png,.jpg,.jpeg" required>
        </div>

        <!-- زر الإرسال -->
        <button type="submit">إرسال الطلب</button>

    </form>

</div>

</body>
</html>
