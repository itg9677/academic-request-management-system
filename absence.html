<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع عذر الغياب</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="absence-page">

<div class="container">
    <div class="logo-container">
        <img src="images/Qassim_University_logo.svg.png" alt="شعار الجامعة" class="logo">
        <img src="images/pattern.png" alt="" class="header-pattern">
    </div>

    <h2>رفع عذر الغياب</h2>

    <form id="excuseForm">

        <!-- اسم المادة -->
        <div class="form-group">
    <label>رمز المقرر</label>

    <select id="courseSelect" required>
        <option value="">اختر المقرر</option>
    </select>
</div>

        <!-- تاريخ الغياب -->
        <div class="form-group">
            <label>تاريخ الاختبار</label>
            <input type="date" id="examDate" required>
        </div>

        <!-- نوع الاختبار -->
        <div class="form-group">
            <label>نوع الاختبار</label>
            <select id="examType" required>
                <option value="" disabled selected>اختر نوع الاختبار</option>
                <option value="midterm1">اختبار منتصف الفصل الأول (midterm1)</option>
                <option value="midterm2">اختبار منتصف الفصل الثاني (midterm2)</option>
                <option value="final">الاختبار النهائي (final)</option>
            </select>
        </div>

        <!-- سبب الغياب -->
        <div class="form-group">
            <label>سبب الغياب</label>
            <textarea id="reason" placeholder="اكتب سبب الغياب" rows="4" required></textarea>
        </div>

        <!-- رفع ملف -->
        <div class="form-group">
            <label>إرفاق ملف</label>
            <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg" required>
        </div>

        <!-- زر الإرسال -->
        <button type="submit">إرسال الطلب</button>
        <br><br>
        <button type="button" class="btn-track" onclick="window.location.href='ExcusesHistory.html'">متابعة طلب سابق</button>

    </form>

</div>

<script type="module" src="absence.js"></script>

</body>
</html>
