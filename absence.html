<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع عذر الغياب</title>
    <link rel="stylesheet" href="style.css">
    <style>    
        /* =====================================================
   أزرار النموذج
===================================================== */

.actions{

    margin-top:35px;

    display:flex;

    flex-direction:column;

    gap:18px;

}

.btn-submit{

    width:100%;

    padding:15px;

    border:none;

    border-radius:14px;

    background:var(--primary);

    color:#fff;

    font-size:17px;

    font-weight:700;

    font-family:'Tajawal',sans-serif;

    cursor:pointer;

    transition:.25s;

}

.btn-submit:hover{

    background:#15325c;

    transform:translateY(-2px);

    box-shadow:0 10px 22px rgba(26,58,107,.20);

}

.actions-bottom{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;

}

.btn-home,
.btn-track{

    width:100%;

    padding:13px;

    border:none;

    border-radius:12px;

    font-size:15px;

    font-weight:700;

    font-family:'Tajawal',sans-serif;

    cursor:pointer;

    transition:.25s;

}

.btn-home{

    background:#6b7280;

    color:#fff;

}

.btn-home:hover{

    background:#59616d;

}

.btn-track{

    background:var(--secondary);

    color:#fff;

}

.btn-track:hover{

    background:#b88620;

}
    </style>
</head>

<body class="absence-page">

<div class="container">
    <div class="logo-container">
        <img src="images/Qassim_University_logo.svg.png" alt="شعار الجامعة" class="logo">
        <img src="images/pattern.png" alt="" class="header-pattern">
    </div>

    <h2>رفع عذر الغياب</h2>

    <form id="excuseForm">

        <!-- رمز المقرر -->
        <div class="form-group">
    <label>رمز المقرر</label>

    <select id="courseSelect" required>
        <option value="">اختر المقرر</option>
    </select>
</div>
<!-- رقم الشعبة -->
<div class="form-group">
    <label>رقم الشعبة</label>
    <input
        type="text"
        id="sectionNumber"
        placeholder="الرجاء كتابة رقم الشعبة"
        required
    >
</div>
        <!-- تاريخ الاختبار -->
        <div class="form-group">
            <label>تاريخ الاختبار</label>
            <input type="date" id="examDate" required>
        </div>

        <!-- نوع الاختبار -->
        <div class="form-group">
            <label>نوع الاختبار</label>
            <select id="examType" required>
                <option value="" disabled selected>اختر نوع الاختبار</option>
                <option value="midterm1">اختبار فصلي أول</option>
                <option value="midterm2">اختبار فصلي ثاني</option>
                <option value="final">اختبار نهائي</option>
            </select>
        </div>

        <!-- سبب الغياب -->
        <div class="form-group">
            <label>سبب الغياب</label>
            <textarea id="reason" placeholder="الرجاء كتابة سبب الغياب" rows="4" required></textarea>
        </div>

        <!-- رفع ملف -->
        <div class="form-group">
            <label>إرفاق ملف (PDF أو صورة)</label>
            <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg" required>
        </div>

<div class="actions">

    <button type="submit" class="btn-submit">
        إرسال الطلب
    </button>

    <div class="actions-bottom">

        <button type="button"
                class="btn-home"
                onclick="location.href='studentMainPage.html'">

            العودة للصفحة الرئيسية

        </button>

        <button type="button"
                class="btn-track"
                onclick="location.href='ExcusesHistory.html'">

            متابعة الطلبات السابقة

        </button>

    </div>
    </form>
</div>

<script type="module" src="absence.js"></script>


</body>
</html>
