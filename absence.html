<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع عذر الغياب</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="absence-page">

<div class="container">
    <div class="logo-container">
    <img src="images/Qassim_University_logo.svg.png" alt="شعار الجامعة" class="logo">

    <img src="images/pattern.png" alt="" class="header-pattern">
</div>

    <h2>رفع عذر الغياب</h2>
<form>

    <!-- اسم المادة -->
    <div class="form-group">
        <label>رمز المقرر</label>
        <input type="text" placeholder="أدخل رمز المقرر" required>
    </div>

    <!-- تاريخ الغياب -->
    <div class="form-group">
        <label>تاريخ الغياب</label>
        <input type="date" required>
    </div>

    <!-- نوع الاختبار -->
    <div class="form-group">
        <label>نوع الاختبار</label>
        <select required>
            <option value="" disabled selected>اختر نوع الاختبار</option>
            <option value="midterm1">اختبار منتصف الفصل الأول (mid1)</option>
            <option value="midterm2">اختبار منتصف الفصل الثاني (mid2)</option>
            <option value="final">الاختبار النهائي (final)</option>
        </select>
    </div>

    <!-- سبب الغياب -->
    <div class="form-group">
        <label>سبب الغياب</label>
        <textarea placeholder="اكتب سبب الغياب" rows="4" required></textarea>
    </div>

    <!-- رفع ملف -->
    <div class="form-group">
        <label>إرفاق ملف</label>
        <input type="file" accept=".pdf,.png,.jpg,.jpeg" required>
    </div>

    <!-- زر الإرسال -->
    <button type="submit">إرسال الطلب</button>
    <br><br>
    <button type="button" class="btn-track" onclick="window.location.href='ExcusesHistory.html'">متابعة طلب سابق</button>

</form>
</div>

</body>
</html>
