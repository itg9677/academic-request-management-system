<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الطالب</title>

<link rel="stylesheet" href="style.css">

<style>

.student-info-card{
    width: 100%;
    max-width: 700px;
    margin: 20px auto;
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}

.student-info-card h3{
    margin: 0 0 15px;
    color: #1a3a6b;
    text-align: right;
}

.info-row{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.info-row:last-child{
    border-bottom: none;
}

.info-label{
    font-weight: bold;
    color: #1a3a6b;
}

.info-value{
    color: #444;
}

</style>

</head>

<body class="student-main-page">

<header>

    <img
        src="images/Qassim_University_logo.svg.png"
        alt="شعار الجامعة">

  <!--  <div class="welcome-text">
        مرحباً، <span id="fullName">...</span>
    </div> -->

</header>

<main>

    <img
        src="images/pattern.png"
        class="science-pattern"
        alt="">

    <!-- بيانات الطالب -->

    <div class="student-info-card">

        <h3>بيانات الطالب</h3>

        <div class="info-row">
            <span class="info-label">الاسم</span>
            <span class="info-value" id="fullName">...</span>
        </div>

        <div class="info-row">
            <span class="info-label">الرقم الجامعي</span>
            <span class="info-value" id="universityId">...</span>
        </div>

        <div class="info-row">
            <span class="info-label">التخصص</span>
            <span class="info-value" id="major">...</span>
        </div>

        <div class="info-row">
                 <span class="info-label">رقم الجوال</span>
                 <span class="info-value" id="phoneNumber">...</span>
        </div>

    </div>

    <!-- الخدمات -->

    <div class="options-card">

        <div class="card-title">
            الخدمات الطلابية
        </div>

        <a class="option-link" href="request.html">
            طلبات الحذف والإضافة
        </a>

        <a class="option-link" href="visitRequestPage.html">
            طلبات الزيارة
        </a>

        <a class="option-link" href="absence.html">
            طلبات رفع الأعذار
        </a>

    </div>

</main>
<script type="module" src="studentMain.js"></script>
</body>
</html>
