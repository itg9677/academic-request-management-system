<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الطالب</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="student-main-page">
  <!-- ترويسة -->
  <header>
    <img src="images/Qassim_University_logo.svg.png" alt="شعار جامعة القصيم" />
    <span class="welcome-text">
      مرحباً، <span id="fullName">...</span>
    </span>
  </header>

  <!-- خيارات الطالب -->
  <main>
    <div class="options-card">
      <p class="card-title">الخدمات الطلابية</p>

      <a class="option-link" href="add-drop.html">طلبات الحذف والإضافة</a>
      <hr class="divider" />
      <a class="option-link" href="visitRequestPage.html">طلبات الزيارة</a>
      <hr class="divider" />
      <a class="option-link" href="absence.html">طلبات رفع الأعذار</a>
    </div>
  </main>
 
  <script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      // لو ما سجل دخول → رجّعه للوقن
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      // جلب بيانات الطالب من كولكشن students
      const studentRef  = doc(db, "students", user.uid);
      const studentSnap = await getDoc(studentRef);

      if (studentSnap.exists()) {
        const data = studentSnap.data();

        // عرض الاسم من فيلد fullName
        document.getElementById("fullName").textContent = data.fullName;

        // التحقق إن الـ role طالب فعلاً
        if (data.role !== "student") {
          window.location.href = "login.html";
        }
      }
    });
  </script>

</body>
</html>
