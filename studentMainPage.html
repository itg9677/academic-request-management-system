<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الطالب</title>

<link rel="stylesheet" href="style.css">

<style>

.student-info-card{
    width: 100%;
    max-width: 700px;
    margin: 20px auto;
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}

.student-info-card h3{
    margin: 0 0 15px;
    color: #1a3a6b;
    text-align: right;
}

.info-row{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.info-row:last-child{
    border-bottom: none;
}

.info-label{
    font-weight: bold;
    color: #1a3a6b;
}

.info-value{
    color: #444;
}

</style>

</head>

<body class="student-main-page">

<header>

    <img
        src="images/Qassim_University_logo.svg.png"
        alt="شعار الجامعة">

  <!--  <div class="welcome-text">
        مرحباً، <span id="fullName">...</span>
    </div> -->

</header>

<main>

    <img
        src="images/pattern.png"
        class="science-pattern"
        alt="">

    <!-- بطاقة بيانات الطالب -->
    <div class="student-info-card">

        <div class="card-header">

            <h3>بيانات الطالب</h3>
            <button id="editProfileBtn" class="btn"> تعديل البيانات</button>
        </div>

        <div class="info-row">
            <span class="info-label">الاسم</span>
            <span class="info-value" id="fullName">...</span>
        </div>

        <div class="info-row">
            <span class="info-label">الرقم الجامعي</span>
            <span class="info-value" id="universityId">...</span>
        </div>

        <div class="info-row">
            <span class="info-label">التخصص</span>
            <span class="info-value" id="major">...</span>
        </div>

        <div class="info-row">
            <span class="info-label">رقم الجوال</span>
            <span class="info-value" id="phoneNumber">...</span>
        </div>

    </div>

    <!-- بطاقة الخدمات -->
    <div class="options-card">

        <div class="card-title">
            الخدمات الطلابية
        </div>

        <a class="option-link" href="request.html">
            طلبات الحذف والإضافة
        </a>

        <a class="option-link" href="visitRequestPage.html">
            طلبات الزيارة
        </a>

        <a class="option-link" href="absence.html">
            طلبات رفع الأعذار
        </a>

    </div>

</main>
<script type="module" src="studentMain.js"></script>
<div id="editModal"
style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.5);z-index:9999;">

    <div style="
        background:#fff;
        width:90%;
        max-width:400px;
        margin:100px auto;
        padding:20px;
        border-radius:15px;">

        <h3>تعديل البيانات</h3>

            <label>التخصص</label>

            <select
                id="editMajor"
                style="
                width:100%;
                padding:10px;
                margin:8px 0 15px;">

                <option value="فيزياء">فيزياء</option>
                <option value="كيمياء">كيمياء</option>
                <option value="أحياء">أحياء</option>
                <option value="رياضيات">رياضيات</option>
                <option value="إحصاء">إحصاء</option>

            </select>

        <label>رقم الجوال</label>

        <input
            type="text"
            id="editPhone"
            style="
            width:100%;
            padding:10px;
            margin:8px 0 15px;">

        <div style="
            display:flex;
            justify-content:flex-end;
            gap:10px;">

            <button id="closeModalBtn">
                إلغاء
            </button>

            <button id="saveProfileBtn">
                حفظ
            </button>

        </div>

    </div>

</div>
</body>
</html>
