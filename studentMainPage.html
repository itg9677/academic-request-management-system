```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الطالب</title>

<link rel="stylesheet" href="style.css">

<style>

.student-info-card{
    width:100%;
    max-width:700px;
    margin:20px auto;
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.student-info-card h3{
    margin:0 0 15px;
    color:#1a3a6b;
    text-align:right;
}

.info-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.info-row:last-child{
    border-bottom:none;
}

.info-label{
    font-weight:bold;
    color:#1a3a6b;
}

.info-value{
    color:#444;
}

.edit-profile-btn{
    background:#1a3a6b;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.edit-profile-btn:hover{
    opacity:.9;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    background:#fff;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:400px;
}

.modal-content h3{
    margin-top:0;
    color:#1a3a6b;
}

.modal-content label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
}

.modal-content input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

.modal-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.modal-buttons button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#saveProfileBtn{
    background:#1a3a6b;
    color:white;
}

#closeModalBtn{
    background:#ddd;
}

</style>

</head>

<body class="student-main-page">

<header>

    <img
        src="images/Qassim_University_logo.svg.png"
        alt="شعار الجامعة">

</header>

<main>

    <img
        src="images/pattern.png"
        class="science-pattern"
        alt="">

    <!-- بيانات الطالب -->

    <div class="student-info-card">

        <h3>بيانات الطالب</h3>

        <div class="info-row">
            <span class="info-label">الاسم</span>
            <span class="info-value" id="fullName">...</span>
        </div>

        <div class="info-row">
            <span class="info-label">الرقم الجامعي</span>
            <span class="info-value" id="universityId">...</span>
        </div>

        <div class="info-row">
            <span class="info-label">التخصص</span>
            <span class="info-value" id="major">...</span>
        </div>

        <div class="info-row">
            <span class="info-label">رقم الجوال</span>
            <span class="info-value" id="phoneNumber">...</span>
        </div>

        <div style="margin-top:15px;text-align:left;">
            <button id="editProfileBtn" class="edit-profile-btn">
                بياناتي
            </button>
        </div>

    </div>

    <!-- الخدمات -->

    <div class="options-card">

        <div class="card-title">
            الخدمات الطلابية
        </div>

        <a class="option-link" href="request.html">
            طلبات الحذف والإضافة
        </a>

        <a class="option-link" href="visitRequestPage.html">
            طلبات الزيارة
        </a>

        <a class="option-link" href="absence.html">
            طلبات رفع الأعذار
        </a>

    </div>

</main>

<!-- نافذة تعديل البيانات -->

<div id="profileModal" class="modal">

    <div class="modal-content">

        <h3>تعديل البيانات</h3>

        <label>رقم الجوال</label>
        <input type="text" id="editPhone">

        <label>التخصص</label>
        <input type="text" id="editMajor">

        <div class="modal-buttons">
            <button id="saveProfileBtn">
                حفظ التعديلات
            </button>

            <button id="closeModalBtn">
                إلغاء
            </button>
        </div>

    </div>

</div>

<script type="module" src="studentMain.js"></script>

</body>
</html>
```
